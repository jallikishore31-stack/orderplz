<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | OrderPlz</title>
    <link rel="stylesheet" href="../static/css/styles.css">
    <style>
        .checkout-wrapper {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 3rem;
            max-width: 1000px;
            margin: 0 auto;
        }
        @media(max-width: 800px) { .checkout-wrapper { grid-template-columns: 1fr; } }
        .payment-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 2rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="brand">
            OrderPlz
        </div>
        <div class="nav-links">
            <a href="index.html">⬅ Back to Menu</a>
        </div>
    </nav>

    <main class="container">
        <!-- Secure Header -->
        <div style="text-align: center; margin-bottom: 2rem;">
            <span class="secure-badge" style="display: inline-flex; margin-bottom: 1rem;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                256-Bit SSL Encrypted Checkout
            </span>
            <h1>Complete Your Order</h1>
        </div>

        <div class="checkout-wrapper">
            <!-- Payment Form -->
            <div class="payment-box">
                <h3 style="margin-bottom: 1.5rem; font-size: 1.25rem;">Payment Details</h3>
                <form onsubmit="event.preventDefault(); alert('Secure payment processed successfully!'); window.location.href='index.html';">
                    <div class="form-group">
                        <label class="form-label">Name on Card</label>
                        <input type="text" class="form-control" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Card Number</label>
                        <input type="text" class="form-control" placeholder="0000 0000 0000 0000" pattern="\d*" maxlength="16" required>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label class="form-label">Expiry Date</label>
                            <input type="text" class="form-control" placeholder="MM/YY" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">CVC</label>
                            <input type="password" class="form-control" placeholder="***" maxlength="3" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; font-size: 1rem; padding: 1rem;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 0.5rem;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                        Pay Securely Now
                    </button>
                    
                    <p style="text-align: center; font-size: 0.75rem; color: var(--text-secondary); margin-top: 1rem;">
                        Your payment information is encrypted and never stored on our servers.
                    </p>
                </form>
            </div>

            <!-- Order Summary Sidebar -->
            <div>
                <div class="cart-panel">
                    <div class="cart-header">Order Summary</div>
                    <div id="cart-items" class="cart-items">
                        <!-- Loaded via JS -->
                    </div>
                    <div class="cart-summary">
                        <div class="summary-row">
                            <span>Subtotal</span>
                            <span id="cart-subtotal">$0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>Convenience Fee</span>
                            <span>$2.00</span>
                        </div>
                        <div class="summary-total">
                            <span>Amount to Pay</span>
                            <span id="cart-total">$0.00</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../static/js/cart.js"></script>
</body>
</html>
